<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Сторінку не знайдено | ToolboxHelp.com</title>
<meta name="description" content="Сторінку не знайдено. Поверніться на головну сторінку ToolboxHelp.com — інструменти для веброзробників.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="img/favicon.ico" type="image/x-icon">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--s1:#161b27;--s2:#1a2236;
  --border:#243047;--border2:#2e3d5a;
  --text:#a8b8d0;--text2:#e2e8f4;--muted:#435070;
  --accent:#18e070;--red:#e05555;--red-dim:rgba(224,85,85,0.11);
  --mono:'Geist Mono',monospace;--sans:'Geist',sans-serif;
}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.p4{text-align:center;max-width:400px;width:100%}
.p4-code{font-family:var(--mono);font-size:clamp(72px,15vw,112px);font-weight:700;line-height:1;
  letter-spacing:-4px;color:var(--s2);-webkit-text-stroke:1px var(--border2);margin-bottom:8px}
.p4-label{font-family:var(--mono);font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);margin-bottom:22px}
.p4-title{font-size:20px;font-weight:600;color:var(--text2);margin-bottom:10px;letter-spacing:-0.3px}
.p4-desc{font-family:var(--mono);font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:20px}
.p4-path{font-family:var(--mono);font-size:11px;color:var(--red);background:var(--red-dim);
  border:1px solid rgba(224,85,85,.25);border-radius:6px;padding:7px 14px;display:inline-block;
  margin-bottom:28px;word-break:break-all;max-width:100%}
.p4-btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#0d1117;
  font-family:var(--mono);font-size:12px;font-weight:700;padding:11px 22px;border-radius:7px;
  text-decoration:none;transition:all .15s;letter-spacing:.3px}
.p4-btn:hover{background:#2fffaa;transform:translateY(-1px)}
</style>
</head>
<body>
  <div class="p4">
    <div class="p4-code">404</div>
    <div class="p4-label">page not found</div>
    <div class="p4-title">Сторінку не знайдено</div>
    <div class="p4-desc">
      Можливо, адресу введено з помилкою<br>або сторінку було видалено.
    </div>
    <div class="p4-path" id="p4-path"></div>
    <br>
    <a href="/" class="p4-btn">← На головну</a>
  </div>
  <script>
    document.getElementById('p4-path').textContent = window.location.pathname;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolboxHelp.com — Інструменти для веброзробників</title>
<meta name="description" content="ToolboxHelp — безкоштовний набір офлайн-утиліт для веброзробників. CSS конвертер, генератор паролів, QR-коди, JSON validator, Base64, Diff checker та ще 13+ інструментів. Без реєстрації.">
<meta name="keywords" content="css units converter, color converter, password generator, qr code, json validator, base64 encoder, hash generator, diff checker, url encoder, markdown editor, whois lookup, ascii converter, developer tools, веброзробник">
<meta name="author" content="ToolboxHelp.com">
<!-- Open Graph -->
<meta property="og:title" content="ToolboxHelp.com — Developer Tools">
<meta property="og:description" content="Blazing-fast offline-first utilities for web developers. No downloads, no sign-ups.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://toolboxhelp.com">
<meta property="og:locale" content="uk_UA">
<meta property="og:locale:alternate" content="en_US">
<!-- SEO: multilingual alternate links -->
<link rel="alternate" hreflang="uk" href="https://toolboxhelp.com/">
<link rel="alternate" hreflang="en" href="https://toolboxhelp.com/?lang=en">
<link rel="alternate" hreflang="x-default" href="https://toolboxhelp.com/">
<!-- Canonical -->
<link rel="canonical" href="https://toolboxhelp.com/">
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="img/favicon.ico" type="image/x-icon">
<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1778963811750250" crossorigin="anonymous"></script>
<!-- Version loader -->
<script>
  fetch('/VERSION').then(r => r.ok ? r.text() : Promise.reject())
    .catch(() => fetch('VERSION').then(r => r.text()))
    .then(v => { const el = document.getElementById('app-version'); if (el) el.textContent = 'v' + v.trim(); })
    .catch(() => {});
</script>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-eyebrow"><span class="logo-dot"></span><span data-i18n="ui.online">ONLINE</span></div>
    <div class="logo-name">ToolboxHelp</div>
    <div class="logo-ver" id="app-version">v—</div>
  </div>
  <nav class="nav" id="nav"></nav>
  <div class="sidebar-footer">
    <div class="sf-r">
      <span data-i18n="ui.active_tools">active tools</span>
      <span id="sf-count">0</span>
    </div>
  </div>
</aside>
<div class="mob-overlay" id="mob-overlay"></div>

<main class="main">
  <div class="topbar">
    <button class="burger" id="burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="tb-path"><span class="tb-acc">$</span> <span data-i18n="ui.path_prefix">~/toolbox/</span><b id="tb-path">home</b></div>
    <div class="tb-right">
      <div class="tb-dot"></div>
      <span id="tb-clock">--:--:--</span>
      <!-- Language switcher -->
      <div class="lang-switch" id="lang-switch">
        <button class="lang-btn active" data-lang="uk">UK</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
  </div>
  <div class="content" id="content"></div>

  <!-- Site Footer -->
  <footer class="site-footer">
    <div class="site-footer-inner">
      <span class="site-footer-copy">©
        <span id="footer-year"></span> ToolboxHelp.com
      </span>
      <nav class="site-footer-nav">
        <a href="/about"    class="site-footer-link" data-i18n="footer.about">Про нас</a>
        <a href="/contacts" class="site-footer-link" data-i18n="footer.contacts">Контакти</a>
        <a href="/privacy"  class="site-footer-link" data-i18n="footer.privacy">Конфіденційність</a>
      </nav>
    </div>
  </footer>

  <!-- Google AdSense Banner -->
  <!-- Outer wrapper: AdSense overrides height on .ad-bar itself,        -->
  <!-- so we clip with an OUTER div that AdSense script never touches.   -->
  <div class="ad-bar-outer">
    <div class="ad-bar" id="ad-bar">
      <span class="ad-label" data-i18n="footer.ad">Ad</span>
      <ins class="adsbygoogle"
           style="display:inline-block;width:728px;height:90px"
           data-ad-client="ca-pub-1778963811750250"
           data-ad-slot="1905379734">
      </ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </div>
</main>

<div class="notif" id="notif"><div class="ndot"></div><span id="notif-msg"></span></div>

<script>
  (function(){
    const F = 2026, n = new Date().getFullYear();
    document.getElementById('footer-year').textContent = n === F ? F : F + '–' + n;
  })();
</script>
<script type="module" src="js/main.js"></script>
<script defer src="/_vercel/insights/script.js"></script>

</body>
</html>
